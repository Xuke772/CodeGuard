name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai pyyaml keyring fastapi python-dotenv tiktoken pytest pytest-asyncio pytest-mock
      - name: Run tests
        run: |
          PYTHONPATH=. python -m pytest -v --tb=short --no-header

  build-docker:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t codeguard .